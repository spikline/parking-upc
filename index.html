<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parking Pro - El Agustino Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden text-slate-700">

    <aside class="w-72 bg-[#1e3a8a] text-white flex flex-col shadow-2xl z-10">
        <div class="p-8">
            <div class="flex items-center gap-3">
                <div class="bg-blue-500 p-2 rounded-lg shadow-lg">
                    <i data-lucide="parking-square" class="w-6 h-6 text-white"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold leading-tight uppercase tracking-tighter">Parking Pro</h1>
                    <p class="text-[10px] text-blue-300 uppercase tracking-widest font-bold">Gestión de Cochera</p>
                </div>
            </div>
        </div>

        <nav class="flex-1 px-4 space-y-1">
            <button onclick="cambiarVista('registrar')" id="btnNavReg" class="w-full flex items-center gap-4 px-4 py-3 bg-blue-600 rounded-xl font-semibold shadow-lg transition-all border border-blue-400/30">
                <i data-lucide="plus-circle" class="w-5 h-5"></i> Registrar Entrada
            </button>
            <button onclick="cambiarVista('salida')" id="btnNavSal" class="w-full flex items-center gap-4 px-4 py-3 text-blue-100 hover:bg-blue-700/50 rounded-xl transition-all">
                <i data-lucide="log-out" class="w-5 h-5"></i> Salida de Vehículo
            </button>
            <div class="pt-4 pb-2 px-4 text-[10px] font-black text-blue-400 uppercase tracking-widest opacity-50">Administración</div>
            <button onclick="alert('Próximamente')" class="w-full flex items-center gap-4 px-4 py-3 text-blue-100 hover:bg-blue-700/50 rounded-xl transition-all">
                <i data-lucide="bar-chart-3" class="w-5 h-5"></i> Estadísticas
            </button>
        </nav>

        <div class="p-4 mt-auto mb-6 mx-4 bg-blue-900/40 rounded-2xl border border-blue-700/30">
            <p class="text-[10px] text-blue-400 uppercase font-bold mb-1 tracking-widest">Operador</p>
            <p class="text-sm font-bold">Nicolás Condori</p>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto p-10 bg-[#f8fafc]">
        <header class="mb-10 flex justify-between items-start">
            <div>
                <h2 id="tituloVista" class="text-4xl font-black text-slate-900 tracking-tighter italic">Registrar Vehículo</h2>
                <p id="descVista" class="text-slate-500 font-medium">Control de ingresos en tiempo real</p>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 text-center min-w-[150px]">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Hora Actual</p>
                <p id="reloj" class="text-xl font-black text-blue-600 font-mono">--:--:--</p>
            </div>
        </header>

        <div class="grid grid-cols-12 gap-10">
            <div class="col-span-12 lg:col-span-7 space-y-6">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200">
                    <label class="block text-xs font-black text-slate-400 uppercase tracking-[0.2em] mb-6">Datos del Vehículo</label>
                    <div class="space-y-8">
                        <input id="placaInput" type="text" placeholder="ABC-123" 
                            class="w-full p-6 bg-slate-50 border-2 border-slate-100 rounded-3xl text-5xl font-mono font-black text-center focus:border-blue-500 focus:bg-white outline-none transition-all uppercase shadow-inner">
                        
                        <div id="panelMonto" class="hidden p-6 bg-amber-50 rounded-3xl border border-amber-100 flex justify-between items-center">
                            <div><span class="block text-[10px] font-bold text-amber-500 uppercase">Estado</span><span class="text-amber-700 font-black text-lg italic uppercase">Pendiente de Cobro</span></div>
                            <div class="text-right"><span class="block text-[10px] font-bold text-amber-500 uppercase italic">Tarifa Sugerida</span><span class="text-amber-900 font-black text-3xl font-mono">S/ 5.00</span></div>
                        </div>

                        <button id="btnEjecutar" onclick="procesar()" class="w-full py-6 bg-slate-900 text-white rounded-3xl font-black text-xl hover:bg-blue-700 hover:shadow-2xl transition-all flex items-center justify-center gap-4 transform active:scale-95 shadow-xl">
                            <i data-lucide="zap" class="w-6 h-6 fill-current"></i> <span id="txtBtn">REGISTRAR ENTRADA</span>
                        </button>
                    </div>
                </div>
            </div>

            <div class="col-span-12 lg:col-span-5 flex flex-col">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200 flex-1">
                    <div class="flex justify-between items-center mb-8 border-b border-slate-100 pb-4"><h3 class="text-xs font-black text-slate-400 uppercase tracking-widest italic">Actividad Reciente</h3></div>
                    <div id="lista" class="space-y-4"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
